name: Keep Render & Neon Awake

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  # Allows you to trigger this manually from the GitHub Actions tab if needed
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API to wake Render and query Neon
        # Replace the URL below with your actual Render URL and a valid GET endpoint
        run: |
          curl -s https://oniva-be.onrender.com/health > /dev/null
          echo "Ping successful!"